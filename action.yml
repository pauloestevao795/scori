name: 'scori — dependency friction check'
description: >
  Compute friction scores for all Python dependencies and gate your CI
  pipeline on a configurable threshold. Optionally posts a friction table
  as a pull request comment.

branding:
  icon: 'shield'
  color: 'orange'

inputs:
  path:
    description: 'Root of the project to scan (default: repo root)'
    default: '.'
  threshold:
    description: 'Exit with code 1 if any dependency score exceeds this value (default: 75)'
    default: '75'
  github-token:
    description: 'GitHub token — raises API rate limit and enables PR comments'
    default: ${{ github.token }}
  comment-pr:
    description: 'Post the friction table as a comment on pull requests (true/false)'
    default: 'false'
  format:
    description: 'Output format for the friction table (table, json, markdown)'
    default: 'table'

outputs:
  result:
    description: 'JSON array of FrictionResult objects'
    value: ${{ steps.friction.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install scori
      shell: bash
      run: pip install --quiet "scori==${{ env.SCORI_VERSION || '*' }}"

    - name: Run friction check
      id: friction
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set +e
        scori friction \
          --path "${{ inputs.path }}" \
          --format markdown \
          --threshold "${{ inputs.threshold }}" \
          > /tmp/scori-table.md
        scori friction \
          --path "${{ inputs.path }}" \
          --format json \
          > /tmp/scori-results.json
        scori friction \
          --path "${{ inputs.path }}" \
          --ci \
          --threshold "${{ inputs.threshold }}" \
          --format table
        EXIT_CODE=$?
        echo "result=$(cat /tmp/scori-results.json | tr -d '\n')" >> "$GITHUB_OUTPUT"
        exit $EXIT_CODE

    - name: Comment on PR
      if: inputs.comment-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        BODY=$(cat /tmp/scori-table.md)
        BODY="$BODY

        ---
        *Generated by [scori](https://github.com/pauloestevao795/scori) — threshold: ${{ inputs.threshold }}*"
        gh pr comment "${{ github.event.pull_request.number }}" \
          --body "$BODY" \
          --repo "${{ github.repository }}" \
          --edit-last 2>/dev/null \
          || gh pr comment "${{ github.event.pull_request.number }}" \
               --body "$BODY" \
               --repo "${{ github.repository }}"
