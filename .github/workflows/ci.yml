name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install deps
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check .
      - name: Type-check
        run: uv run mypy src/
      - name: Test
        run: uv run pytest
      - name: Security audit
        run: uv run pip-audit --skip-editable
